<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/agora-site-icon.png?v=20260722-4" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260722-4" />
    <link rel="apple-touch-icon" href="/brand/agora-site-icon.png?v=20260722-4" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta id="agora-color-scheme" name="color-scheme" content="light" />
    <meta id="agora-theme-color" name="theme-color" content="#f2efe7" />
    <script>
      (() => {
        window.syncAgoraTheme = dark => {
          const scheme = dark ? 'dark' : 'light';
          const background = dark ? '#01040a' : '#f2efe7';
          const root = document.documentElement;
          root.dataset.theme = scheme;
          root.style.colorScheme = scheme;
          root.style.backgroundColor = background;
          if (document.body) {
            document.body.style.colorScheme = scheme;
            document.body.style.backgroundColor = background;
          }
          document.getElementById('agora-color-scheme').content = scheme;
          document.getElementById('agora-theme-color').content = background;
        };
        try {
          window.syncAgoraTheme(JSON.parse(localStorage.getItem('qb_dark') || 'false') === true);
        } catch (_) {}
      })();
    </script>
    <meta name="description" content="Ágora do Saber — Lux in tenebris." />
    <title>Ágora do Saber</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
