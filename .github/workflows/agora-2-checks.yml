name: Agora 2 Checks

on:
  push:
    branches:
      - agora-2.0
  pull_request:
    branches:
      - agora-2.0

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ci-test-key
      VITE_FIREBASE_AUTH_DOMAIN: agora-2-ci.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: agora-2-ci
      VITE_FIREBASE_STORAGE_BUCKET: agora-2-ci.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "123456789"
      VITE_FIREBASE_APP_ID: ci-test-app
      VITE_APP_ENV: agora-2-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Pre-flight and build
        run: npm run check:2

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
